spring.application.name=brainbox-api

# Server Configuration
server.port=8080

# Database Configuration (Supabase)
# prepareThreshold=0 is added automatically via DataSourceConfig to avoid "prepared statement S_N does not exist" errors
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Resend Configuration
resend.api.key=${RESEND_API_KEY}
resend.from.email=${RESEND_FROM_EMAIL}

# Application URLs
app.base-url=${BASE_URL}
app.frontend-url=${FRONTEND_URL}
app.debug=${APP_DEBUG:false}

# JWT Configuration
jwt.secret.key=${JWT_SECRET_KEY}

# Mail Configuration (SMTP - used when app.debug=true)
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=${MAIL_FROM:noreply@brainbox.com}


